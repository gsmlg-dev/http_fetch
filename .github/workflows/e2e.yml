name: E2E

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Git ref (tag, branch, or SHA) to test — e.g. 0.8.0 or main"
        required: true
        default: "main"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
          fetch-depth: 0

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "28"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Run E2E test suite
        # Runs the e2e suite via the `test.e2e` Mix alias, which expands to
        # `mix test e2e/`. Tag new e2e tests with `@moduletag :e2e` and place
        # them under `e2e/`.
        run: mix test.e2e
        env:
          MIX_ENV: test
