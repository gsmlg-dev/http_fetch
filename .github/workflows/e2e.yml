name: E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Git ref (tag, branch, or SHA) to test, e.g. v0.9.1 or main"
        required: true
        default: "main"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ELIXIR_VERSION: "1.18"
  OTP_VERSION: "28"

jobs:
  e2e:
    name: E2E ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        app:
          - http_core
          - http_fetch
          - http_web_socket
          - http_event_source
          - http_web_transport

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}
          fetch-depth: 0

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Restore Elixir dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Set up Go
        if: matrix.app == 'http_fetch'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Restore Go module cache
        if: matrix.app == 'http_fetch'
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('apps/http_fetch/priv/test_server/go.sum', 'apps/http_fetch/priv/test_server/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build the http_fetch e2e test server
        if: matrix.app == 'http_fetch'
        working-directory: apps/http_fetch/priv/test_server
        run: go build -o ../test_server/server .

      - name: Start the http_fetch e2e test server
        if: matrix.app == 'http_fetch'
        id: server
        run: |
          set -euo pipefail
          ./apps/http_fetch/priv/test_server/server > .e2e_port &
          SERVER_PID=$!
          echo "SERVER_PID=${SERVER_PID}" >> "$GITHUB_OUTPUT"
          for i in {1..50}; do
            if [ -s .e2e_port ]; then
              PORT=$(grep -oE '[0-9]+' .e2e_port | head -n1)
              if curl -fs "http://127.0.0.1:${PORT}/" >/dev/null 2>&1; then
                echo "E2E_BASE_URL=http://127.0.0.1:${PORT}" >> "$GITHUB_ENV"
                echo "Test server ready on port ${PORT}"
                exit 0
              fi
            fi
            sleep 0.2
          done
          echo "::error::E2E test server failed to start within 10s"
          kill "${SERVER_PID}" 2>/dev/null || true
          exit 1

      - name: Run http_fetch E2E test suite
        if: matrix.app == 'http_fetch'
        env:
          MIX_ENV: test
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}
        run: mix test.e2e

      - name: Run app E2E test suite if present
        if: matrix.app != 'http_fetch'
        working-directory: apps/${{ matrix.app }}
        run: |
          set -euo pipefail
          if [ -d e2e ]; then
            MIX_ENV=test mix test e2e/
          else
            echo "No e2e suite for ${{ matrix.app }}"
          fi

      - name: Stop the http_fetch e2e test server
        if: always() && matrix.app == 'http_fetch'
        run: |
          if [ -n "${{ steps.server.outputs.SERVER_PID }}" ]; then
            kill "${{ steps.server.outputs.SERVER_PID }}" 2>/dev/null || true
          fi
          rm -f .e2e_port
