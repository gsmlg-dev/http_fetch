name: release

on:
  workflow_dispatch:
    inputs:
      release-version:
        required: true
        description: 'The version of the release'
        default: '0.1.0'
      git-ref:
        required: true
        description: 'The git revison of repo, branch, tag or commit'
        default: 'main'

permissions:
  actions: write
  contents: write

jobs:
  tests:
    name: Run tests (Elixir ${{matrix.elixir}}, OTP ${{matrix.otp}})

    strategy:
      matrix:
        include:
          - elixir: 1.18
            otp: 27
            lint: lint

    runs-on: ubuntu-latest

    env:
      MIX_ENV: test

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.git-ref }}

    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        otp-version: ${{ matrix.otp }}
        elixir-version: ${{ matrix.elixir }}

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.22"

    - name: Install dependencies
      run: mix deps.get

    - name: Check source code format
      run: mix format --check-formatted

    - name: Remove compiled application files
      run: mix clean

    - name: Compile & lint dependencies
      run: mix compile --warnings-as-errors

    - name: Run tests
      run: mix test

    - name: Run Credo
      run: mix credo

    - name: Run Dialyzer
      run: mix dialyzer --format github

    - name: Build the e2e test server
      working-directory: priv/test_server
      run: go build -o ../test_server/server .

    - name: Start the e2e test server
      id: server
      run: |
        set -euo pipefail
        ./priv/test_server/server > .e2e_port &
        SERVER_PID=$!
        echo "SERVER_PID=${SERVER_PID}" >> "$GITHUB_OUTPUT"
        for i in {1..50}; do
          if [ -s .e2e_port ]; then
            PORT=$(grep -oE '[0-9]+' .e2e_port | head -n1)
            if curl -fs "http://127.0.0.1:${PORT}/" >/dev/null 2>&1; then
              echo "E2E_BASE_URL=http://127.0.0.1:${PORT}" >> "$GITHUB_ENV"
              echo "Test server ready on port ${PORT}"
              exit 0
            fi
          fi
          sleep 0.2
        done
        echo "::error::E2E test server failed to start within 10s"
        kill "${SERVER_PID}" 2>/dev/null || true
        exit 1

    - name: Run E2E test suite
      env:
        E2E_BASE_URL: ${{ env.E2E_BASE_URL }}
      run: mix test.e2e

    - name: Stop the e2e test server
      if: always()
      run: |
        if [ -n "${{ steps.server.outputs.SERVER_PID }}" ]; then
          kill "${{ steps.server.outputs.SERVER_PID }}" 2>/dev/null || true
        fi
        rm -f .e2e_port

    - name: Build docs
      run: |
        MIX_ENV=dev mix deps.get
        MIX_ENV=dev mix docs

  release:
    name: Publish release to hex.pm
    runs-on: ubuntu-latest
    needs: [ tests ]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
    steps:
      - name: 🛑 Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git-ref }}
          fetch-depth: 0

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: 27
          elixir-version: 1.18

      - name: Install dependencies
        run: mix deps.get

      - name: Validate release source
        run: |
          SOURCE_VERSION=$(mix run --no-compile --no-start -e 'IO.puts(Mix.Project.config()[:version])')
          if [ "${SOURCE_VERSION}" != "${{ github.event.inputs.release-version }}" ]; then
            echo "::error::mix.exs version ${SOURCE_VERSION} does not match requested release ${{ github.event.inputs.release-version }}"
            exit 1
          fi
          if ! grep -q "^## \\[${{ github.event.inputs.release-version }}\\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing section ${{ github.event.inputs.release-version }}"
            exit 1
          fi

      - name: Build Hex package
        run: mix hex.build

      - name: Publish to hex.pm
        run: |
          mix hex.publish --yes

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ github.event.inputs.release-version }}"
          git push origin "refs/tags/${{ github.event.inputs.release-version }}"
